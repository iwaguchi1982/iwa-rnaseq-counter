[project]
name = "iwa-rnaseq-counter"
version = "0.1.0"
description = "Wet-first RNA-Seq entry app for Salmon-based transcript/gene quant"
authors = ["Jun Iwaguchi"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11,<3.13"
pandas = ">=2.2.0,<3"
streamlit = ">=1.44.0,<2"
biopython = ">=1.84,<2"
psutil = ">=7.0.0,<8"
pyyaml = ">=6.0.2,<7"

[tasks]
app = "streamlit run iwa_rnaseq_counter.py"
