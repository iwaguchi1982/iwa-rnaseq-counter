[workspace]
name = "iwa-rnaseq-counter"
version = "0.3.0"
description = "Wet-first RNA-Seq entry app for Salmon-based transcript/gene quant"
authors = ["Jun Iwaguchi"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11,<3.13"
pandas = ">=2.2.0,<3"
streamlit = ">=1.44.0,<2"
biopython = ">=1.84,<2"
psutil = ">=7.0.0,<8"
pyyaml = ">=6.0.2,<7"
salmon = "==1.10.1"
gffread = ">=0.12.7,<0.13"
seqkit = ">=2.13.0,<3"
pytest = ">=9.0.3,<10"
pytest-mock = ">=3.15.1,<4"

[tasks]
app = "python -m streamlit run app.py"
